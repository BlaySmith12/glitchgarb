<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COLLECTIONS | GLITCHGARB</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="index.html" class="logo"><img src="logo.png" alt="GLITCHGARB"></a>
            <nav id="main-nav">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="collections.html" class="active">Collections</a>
                <a href="login.html" id="auth-link">Login</a>
                <a href="profile.html" id="profile-link" style="display: none;">Account</a>
            </nav>
            <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>
    <div class="mobile-menu" id="mobile-menu">
        <button class="mobile-menu-close" id="mobile-menu-close" aria-label="Close menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18" />
                <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
        </button>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="collections.html">Collections</a>
        <a href="login.html" id="mobile-auth-link">Login</a>
        <a href="profile.html" id="mobile-profile-link" style="display: none;">Account</a>
        <a href="#" id="mobile-logout-link" style="display: none;">Logout</a>
    </div>

    <main class="container" style="padding-top: 4rem;">
        <h1 style="margin-bottom: 1rem;">Collections</h1>
        <p style="margin-bottom: 3rem; opacity: 0.7;">Explore our curated collections of premium streetwear.</p>

        <!-- All Products Collection -->
        <section class="collection-section" style="margin-bottom: 5rem;">
            <div class="section-title">
                <h2>All Products</h2>
                <span style="font-size: 0.8rem; opacity: 0.6;">Available to everyone</span>
            </div>
            <div id="standard-products" class="product-grid">
                <!-- Products will be rendered here -->
            </div>
        </section>

        <!-- Archive Collection -->
        <section class="collection-section" style="margin-bottom: 5rem;">
            <div class="section-title">
                <h2>The Archive</h2>
                <span style="font-size: 0.8rem; opacity: 0.6;">Sold out drops</span>
            </div>
            <div id="archive-products" class="product-grid" style="opacity: 0.7;">
                <!-- Archived products will be rendered here -->
            </div>
        </section>
    </main>

    <script src="api-service.js"></script>
    <script src="components.js"></script>
    <script src="toast.js"></script>
    <script src="script.js"></script>
    <script>
        // Mobile Menu Toggle
        const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
        const mobileMenuOverlay = document.getElementById('mobile-menu-overlay');
        const mobileMenu = document.getElementById('mobile-menu');
        const mobileMenuClose = document.getElementById('mobile-menu-close');

        function openMobileMenu() {
            mobileMenu.classList.add('open');
            mobileMenuOverlay.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeMobileMenu() {
            mobileMenu.classList.remove('open');
            mobileMenuOverlay.classList.remove('open');
            document.body.style.overflow = '';
        }

        mobileMenuToggle.addEventListener('click', openMobileMenu);
        mobileMenuClose.addEventListener('click', closeMobileMenu);
        mobileMenuOverlay.addEventListener('click', closeMobileMenu);

        // Close menu on escape key
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                closeMobileMenu();
            }
        });

        // Sync mobile menu auth links with main nav
        const authLink = document.getElementById('auth-link');
        const profileLink = document.getElementById('profile-link');
        const mobileAuthLink = document.getElementById('mobile-auth-link');
        const mobileProfileLink = document.getElementById('mobile-profile-link');
        const mobileLogoutLink = document.getElementById('mobile-logout-link');

        function updateAuthLinks() {
            const user = storageService.getCurrentUser();
            if (user) {
                authLink.style.display = 'none';
                profileLink.style.display = 'inline-block';
                mobileAuthLink.style.display = 'none';
                mobileProfileLink.style.display = 'block';
                if (mobileLogoutLink) mobileLogoutLink.style.display = 'block';
            } else {
                authLink.style.display = 'inline-block';
                profileLink.style.display = 'none';
                mobileAuthLink.style.display = 'block';
                mobileProfileLink.style.display = 'none';
                if (mobileLogoutLink) mobileLogoutLink.style.display = 'none';
            }
        }

        // Update auth links on page load and when storage changes
        updateAuthLinks();
        window.addEventListener('storage', updateAuthLinks);

        // Mobile logout handler
        if (mobileLogoutLink) {
            mobileLogoutLink.addEventListener('click', (e) => {
                e.preventDefault();
                storageService.logout();
                Toast.info('Logged out successfully');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            });
        }

        // Render Collections
        async function renderCollections() {
            const products = await storageService.getProducts();

            // All Products Collection - all products are now available to everyone
            const allProducts = products.filter(p => p.stock > 0);
            renderProductGrid('standard-products', allProducts);

            // Archive Collection - sold out products
            const archiveProducts = products.filter(p => p.stock === 0);
            renderProductGrid('archive-products', archiveProducts);
        }

        // Initialize on page load
        renderCollections();

        function renderProductGrid(containerId, products) {
            const container = document.getElementById(containerId);
            if (!container) return;

            container.innerHTML = '';

            if (products.length === 0) {
                container.innerHTML = '<p style="opacity: 0.5; grid-column: 1 / -1; text-align: center; padding: 2rem;">No products in this collection yet.</p>';
                return;
            }

            products.forEach((product, index) => {
                const isLive = new Date(product.releaseDate) <= new Date();
                const isSoldOut = product.stock === 0;

                const card = document.createElement('div');
                card.className = `product-card fade-in ${isSoldOut ? 'sold-out' : ''} ${!isLive ? 'coming-soon' : ''}`;
                card.style.animationDelay = `${index * 0.1}s`;

                let overlayHtml = '';
                if (!isLive) {
                    overlayHtml = `
                        <div class="coming-soon-badge">
                            <span>COMING SOON</span>
                            <strong>${new Date(product.releaseDate).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</strong>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="product-image" style="background: url('${product.image}') center/cover; cursor: pointer;" onclick="location.href='product.html?id=${product.id}'">
                        ${overlayHtml}
                    </div>
                    <div class="product-info">
                        <h3 style="cursor: pointer;" onclick="location.href='product.html?id=${product.id}'">${product.name}</h3>
                        <p class="product-price">GH₵ ${product.price.toFixed(2)}</p>
                        <div id="stock-container-${product.id}"></div>
                        ${isLive && !isSoldOut ? `<button class="buy-btn" data-id="${product.id}">Buy Now</button>` : ''}
                    </div>
                `;

                container.appendChild(card);

                // Initialize Stock Counter
                if (isLive) {
                    new StockCounter(`stock-container-${product.id}`, product.stock, 50);
                }
            });

            // Handle Purchases - Redirect to product page
            container.querySelectorAll('.buy-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = e.target.dataset.id;
                    window.location.href = `product.html?id=${id}`;
                });
            });
        }

        function handlePurchase(productId) {
            // Guest checkout is now allowed - redirect to product page
            window.location.href = `product.html?id=${productId}`;
        }

        // Initialize collections on page load
        document.addEventListener('DOMContentLoaded', renderCollections);
    </script>
</body>

</html>
