<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODUCT DETAILS | GLITCHGARB</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .product-detail-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            margin-top: 4rem;
        }

        .product-main-image {
            width: 100%;
            height: 600px;
            background: var(--secondary-bg);
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .zoom-lens {
            position: absolute;
            border: 1px solid var(--accent-color);
            width: 100px;
            height: 100px;
            background: rgba(0, 255, 255, 0.1);
            display: none;
            pointer-events: none;
        }

        .zoom-results {
            position: absolute;
            top: 0;
            right: -110%;
            width: 100%;
            height: 100%;
            border: 1px solid var(--border-color);
            display: none;
            z-index: 10;
            background: var(--main-bg);
        }

        .product-meta {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .size-selector {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
        }

        /* Product Image Color Overlay Effects */
        .product-main-image {
            position: relative;
            transition: all 0.6s ease;
        }

        .product-main-image::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            opacity: 0;
            transition: all 0.6s ease;
            mix-blend-mode: color;
            pointer-events: none;
            z-index: 1;
        }

        .product-main-image.color-white::before {
            background: #ffffff;
            opacity: 0.5;
            mix-blend-mode: soft-light;
        }

        .product-main-image.color-gray::before {
            background: #666666;
            opacity: 0.4;
            mix-blend-mode: multiply;
        }

        .product-main-image.color-navy::before {
            background: #1a237e;
            opacity: 0.5;
            mix-blend-mode: multiply;
        }

        .product-main-image.color-black::before {
            opacity: 0;
        }

        /* Color preview label */
        .color-preview-label {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: rgba(0, 0, 0, 0.9);
            border: 1px solid var(--accent-color);
            padding: 0.5rem 1rem;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: var(--accent-color);
            z-index: 10;
            opacity: 0;
            transform: translateX(-10px);
            transition: all 0.4s ease;
        }

        .color-preview-label.show {
            opacity: 1;
            transform: translateX(0);
        }

        .size-btn {
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            background: none;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
        }

        .size-btn:hover,
        .size-btn.active {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .product-description {
            line-height: 1.6;
            opacity: 0.8;
            font-size: 0.9rem;
        }

        /* Color and Size Selectors */
        .selector-group {
            margin-top: 2rem;
        }

        .selector-label {
            font-size: 0.7rem;
            letter-spacing: 0.1em;
            opacity: 0.5;
            margin-bottom: 1rem;
            display: block;
            text-transform: uppercase;
        }

        .size-selector {
            display: flex !important;
            gap: 0.75rem;
            margin-top: 1rem;
            flex-wrap: wrap;
            opacity: 1 !important;
            transform: none !important;
        }

        /* Color Swatch Buttons */
        .color-btn {
            width: 50px;
            height: 50px;
            border: 2px solid var(--border-color);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .color-btn:hover {
            border-color: var(--accent-color);
            transform: scale(1.1);
        }

        .color-btn.active {
            border-color: var(--accent-color);
            border-width: 3px;
            box-shadow: 0 0 15px rgba(255, 62, 0, 0.3);
        }

        .color-btn.active::after {
            content: '✓';
            position: absolute;
            color: #fff;
            font-size: 1.2rem;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
        }

        .color-btn.active[data-color="White"]::after {
            color: #000;
        }

        /* Size Buttons */
        .size-btn {
            border: 2px solid var(--border-color);
            padding: 1rem 1.5rem;
            background: transparent;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 700;
            min-width: 60px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            position: relative;
            overflow: hidden;
        }

        .size-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: var(--accent-color);
            transition: left 0.3s ease;
            z-index: -1;
        }

        .size-btn:hover::before {
            left: 0;
        }

        .size-btn:hover {
            border-color: var(--accent-color);
            color: var(--text-color);
        }

        .size-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: #000;
            font-weight: 900;
        }

        .size-btn.active::before {
            display: none;
        }

        /* Product Image Gallery */
        .product-gallery {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .product-thumbnails {
            display: flex;
            gap: 0.5rem;
            order: 2;
            flex-wrap: wrap;
        }

        .thumbnail-btn {
            width: 60px;
            height: 60px;
            border: 1px solid var(--border-color);
            background: var(--secondary-bg);
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            padding: 0;
            flex-shrink: 0;
        }

        .thumbnail-btn:hover {
            border-color: var(--accent-color);
        }

        .thumbnail-btn.active {
            border-color: var(--accent-color);
            border-width: 2px;
        }

        .thumbnail-btn img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .thumbnail-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.7);
            color: #fff;
            font-size: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0.15rem;
            text-align: center;
        }

        .thumbnail-btn.active .thumbnail-label {
            background: var(--accent-color);
            color: #000;
        }

        /* Image view indicator */
        .image-view-indicator {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid var(--border-color);
            padding: 0.4rem 0.8rem;
            font-size: 0.65rem;
            font-weight: 600;
            letter-spacing: 0.08em;
            color: #fff;
            z-index: 10;
            opacity: 0;
            transform: translateY(-5px);
            transition: all 0.3s ease;
        }

        .image-view-indicator.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Mobile Responsiveness */
        @media (max-width: 1024px) {
            .product-detail-grid {
                gap: 2rem;
            }

            .product-main-image {
                height: 450px;
            }

            .thumbnail-btn {
                width: 55px;
                height: 55px;
            }
        }

        @media (max-width: 768px) {
            .product-detail-grid {
                grid-template-columns: 1fr;
                gap: 2rem;
                margin-top: 2rem;
            }

            .product-main-image {
                height: 350px;
            }

            .product-thumbnails {
                justify-content: flex-start;
            }

            .thumbnail-btn {
                width: 50px;
                height: 50px;
            }

            .thumbnail-label {
                font-size: 0.45rem;
            }

            .product-meta h1 {
                font-size: 1.75rem;
            }

            .size-selector {
                flex-wrap: wrap;
            }

            .size-btn {
                padding: 0.75rem 1rem;
                min-width: 50px;
                font-size: 0.85rem;
            }

            .color-btn {
                width: 40px;
                height: 40px;
            }

            #p-price {
                font-size: 1.25rem;
            }

            /* Hide zoom on mobile */
            .zoom-lens,
            .zoom-results {
                display: none !important;
            }
        }

        @media (max-width: 480px) {
            .product-main-image {
                height: 280px;
            }

            .product-meta h1 {
                font-size: 1.5rem;
            }

            .size-btn {
                padding: 0.6rem 0.8rem;
                min-width: 45px;
                font-size: 0.8rem;
            }

            .color-btn {
                width: 35px;
                height: 35px;
            }

            .selector-label {
                font-size: 0.65rem;
            }

            #add-to-cart-btn,
            #buy-btn {
                padding: 1rem !important;
                font-size: 0.85rem !important;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="index.html" class="logo"><img src="logo.png" alt="GLITCHGARB"></a>
            <nav id="main-nav">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="login.html" id="auth-link">Login</a>
                <a href="profile.html" id="profile-link" style="display: none;">Account</a>
            </nav>
            <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle menu">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div class="mobile-menu-overlay" id="mobile-menu-overlay"></div>
    <div class="mobile-menu" id="mobile-menu">
        <button class="mobile-menu-close" id="mobile-menu-close" aria-label="Close menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        <a href="index.html">Home</a>
        <a href="shop.html">Shop</a>
        <a href="login.html" id="mobile-auth-link">Login</a>
        <a href="profile.html" id="mobile-profile-link" style="display: none;">Account</a>
        <a href="#" id="mobile-logout-link" style="display: none;">Logout</a>
    </div>

    <main class="container">
        <div class="product-detail-grid fade-in" id="product-container">
            <!-- Product details loaded via JS -->
            <div id="product-media" class="product-gallery">
                <div class="product-main-image color-black" id="zoom-container">
                    <div class="color-preview-label" id="color-preview-label">COLOR: BLACK</div>
                    <div class="image-view-indicator" id="image-view-indicator">FRONT VIEW</div>
                    <div id="main-img-element" style="width: 100%; height: 100%; background: center/cover;"></div>
                    <div id="lens" class="zoom-lens"></div>
                </div>
                <div id="zoom-result" class="zoom-results"></div>
                <div class="product-thumbnails" id="product-thumbnails">
                    <!-- Thumbnails will be loaded dynamically -->
                </div>
            </div>

            <div class="product-meta">
                <div style="font-size: 0.7rem; letter-spacing: 0.3em; opacity: 0.5;">LIMITED DROP</div>
                <div id="viewing-stats-container"></div>
                <h1 id="p-name" style="font-size: 2.5rem;">Product Name</h1>
                <div id="p-price"
                    style="font-size: 1.5rem; font-weight: 300; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                    GH₵ 0.00</div>

                <div class="product-description" id="p-desc">
                    High-performance utility gear engineered for the streets. Features reinforced stitching and
                    custom-dyed fabrics unique to this drop.
                </div>


                <div class="selector-group" id="color-selector-group">
                    <label class="selector-label">SELECT COLOR</label>
                    <div class="size-selector" id="color-selector">
                        <!-- Colors will be loaded dynamically from product data -->
                    </div>
                </div>

                <div class="selector-group">
                    <label class="selector-label">SELECT SIZE</label>
                    <div class="size-selector" id="size-selector">
                        <button class="size-btn" data-size="S">S</button>
                        <button class="size-btn active" data-size="M">M</button>
                        <button class="size-btn" data-size="L">L</button>
                        <button class="size-btn" data-size="XL">XL</button>
                    </div>
                </div>

                <div id="stock-status"></div>

                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button class="btn btn-outline" id="add-to-cart-btn"
                        style="flex: 1; padding: 1.5rem; font-size: 1rem;">
                        ADD TO CART
                    </button>
                    <button class="btn" id="buy-btn" style="flex: 1; padding: 1.5rem; font-size: 1rem;">BUY NOW</button>
                </div>

                <div style="font-size: 0.7rem; opacity: 0.4; text-align: center; margin-top: 1rem;">
                    *FREE SHIPPING ON ALL DOMESTIC DROPS. TERMS APPLY.
                </div>
            </div>
        </div>
    </main>

    <script src="api-service.js"></script>
    <script src="components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Mobile Menu Toggle
            const mobileMenuToggle = document.getElementById('mobile-menu-toggle');
            const mobileMenuOverlay = document.getElementById('mobile-menu-overlay');
            const mobileMenu = document.getElementById('mobile-menu');
            const mobileMenuClose = document.getElementById('mobile-menu-close');

            function openMobileMenu() {
                mobileMenu.classList.add('open');
                mobileMenuOverlay.classList.add('open');
                document.body.style.overflow = 'hidden';
            }

            function closeMobileMenu() {
                mobileMenu.classList.remove('open');
                mobileMenuOverlay.classList.remove('open');
                document.body.style.overflow = '';
            }

            if (mobileMenuToggle) {
                mobileMenuToggle.addEventListener('click', openMobileMenu);
            }
            if (mobileMenuClose) {
                mobileMenuClose.addEventListener('click', closeMobileMenu);
            }
            if (mobileMenuOverlay) {
                mobileMenuOverlay.addEventListener('click', closeMobileMenu);
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeMobileMenu();
                }
            });

            // Update auth links based on login status
            const authLink = document.getElementById('auth-link');
            const profileLink = document.getElementById('profile-link');
            const mobileAuthLink = document.getElementById('mobile-auth-link');
            const mobileProfileLink = document.getElementById('mobile-profile-link');
            const mobileLogoutLink = document.getElementById('mobile-logout-link');

            function updateAuthLinks() {
                const user = storageService.getCurrentUser();
                if (user) {
                    if (authLink) authLink.style.display = 'none';
                    if (profileLink) profileLink.style.display = 'inline-block';
                    if (mobileAuthLink) mobileAuthLink.style.display = 'none';
                    if (mobileProfileLink) mobileProfileLink.style.display = 'block';
                    if (mobileLogoutLink) mobileLogoutLink.style.display = 'block';
                } else {
                    if (authLink) authLink.style.display = 'inline-block';
                    if (profileLink) profileLink.style.display = 'none';
                    if (mobileAuthLink) mobileAuthLink.style.display = 'block';
                    if (mobileProfileLink) mobileProfileLink.style.display = 'none';
                    if (mobileLogoutLink) mobileLogoutLink.style.display = 'none';
                }
            }

            updateAuthLinks();
            window.addEventListener('storage', updateAuthLinks);

            // Mobile logout handler
            if (mobileLogoutLink) {
                mobileLogoutLink.addEventListener('click', (e) => {
                    e.preventDefault();
                    storageService.logout();
                    Toast.info('Logged out successfully');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                });
            }

            const params = new URLSearchParams(window.location.search);
            const productId = params.get('id');

            // Configuration - must match script.js
            const USE_FIREBASE_API = true;
            const API_BASE_URL = 'http://localhost:5000/api';

            // Helper function to fetch product from API or localStorage
            async function fetchProduct(id) {
                if (USE_FIREBASE_API) {
                    try {
                        const response = await fetch(`${API_BASE_URL}/products/${id}`);
                        const data = await response.json();
                        if (data.success && data.product) {
                            // Normalize product data
                            const product = data.product;
                            return {
                                ...product,
                                releaseDate: product.releaseDate || product.dropDate || new Date().toISOString(),
                                image: product.image || (product.images && product.images[0]) || 'https://images.unsplash.com/photo-1578587018452-892bacefd3f2?auto=format&fit=crop&q=80&w=300',
                                images: product.images ? product.images.map((img, index) => {
                                    if (typeof img === 'string') {
                                        return { url: img, label: index === 0 ? 'Front' : `View ${index + 1}` };
                                    }
                                    return img;
                                }) : [{ url: product.image || 'https://images.unsplash.com/photo-1578587018452-892bacefd3f2?auto=format&fit=crop&q=80&w=300', label: 'Front' }]
                            };
                        }
                        throw new Error('Product not found in API');
                    } catch (error) {
                        console.error('API Error, falling back to localStorage:', error);
                        // Fallback to localStorage
                        const products = storageService.getProducts();
                        return products.find(p => p.id === id);
                    }
                } else {
                    const products = storageService.getProducts();
                    return products.find(p => p.id === id);
                }
            }

            // Load product asynchronously
            async function loadProduct() {
                const product = await fetchProduct(productId);

                if (!product) {
                    window.location.href = 'shop.html';
                    return;
                }

                // Update UI
                document.getElementById('p-name').textContent = product.name;
                document.getElementById('p-price').textContent = `GH₵ ${product.price.toFixed(2)}`;

                // Initialize product images gallery
                const productImages = product.images || [{ url: product.image, label: 'Front' }];
                let currentImageIndex = 0;

                // Set main image
                const mainImgElement = document.getElementById('main-img-element');
                mainImgElement.style.backgroundImage = `url('${productImages[0].url}')`;

                // Render thumbnails
                const thumbnailsContainer = document.getElementById('product-thumbnails');
                if (productImages.length > 1) {
                    thumbnailsContainer.innerHTML = productImages.map((img, index) => `
                        <button class="thumbnail-btn ${index === 0 ? 'active' : ''}" 
                                data-index="${index}"
                                data-url="${img.url}"
                                data-label="${img.label}">
                            <img src="${img.url}" alt="${img.label} view">
                            <span class="thumbnail-label">${img.label}</span>
                        </button>
                    `).join('');
                    thumbnailsContainer.style.display = 'flex';
                } else {
                    thumbnailsContainer.style.display = 'none';
                }

                // Image view indicator
                const imageViewIndicator = document.getElementById('image-view-indicator');

                // Function to switch main image
                function switchMainImage(index, url, label) {
                    currentImageIndex = index;
                    mainImgElement.style.backgroundImage = `url('${url}')`;

                    // Update active thumbnail
                    document.querySelectorAll('.thumbnail-btn').forEach(btn => {
                        btn.classList.remove('active');
                        if (parseInt(btn.dataset.index) === index) {
                            btn.classList.add('active');
                        }
                    });

                    // Show view indicator
                    imageViewIndicator.textContent = `${label.toUpperCase()} VIEW`;
                    imageViewIndicator.classList.add('show');
                    setTimeout(() => {
                        imageViewIndicator.classList.remove('show');
                    }, 2000);

                    // Update zoom functionality with new image
                    initZoom('zoom-container', 'main-img-element', 'lens', 'zoom-result', url);
                }

                // Thumbnail click handlers
                thumbnailsContainer.addEventListener('click', (e) => {
                    const thumbnailBtn = e.target.closest('.thumbnail-btn');
                    if (thumbnailBtn) {
                        const index = parseInt(thumbnailBtn.dataset.index);
                        const url = thumbnailBtn.dataset.url;
                        const label = thumbnailBtn.dataset.label;
                        switchMainImage(index, url, label);
                    }
                });

                const buyBtn = document.getElementById('buy-btn');
                const isSoldOut = product.stock === 0;
                const isLive = new Date(product.releaseDate) <= new Date();
                // All products are now available to everyone - no VIP restrictions

                // Phase 6 Social Proof
                if (typeof ViewingStats !== 'undefined') {
                    new ViewingStats('viewing-stats-container');
                }

                // Render color selector from product data
                const colorSelector = document.getElementById('color-selector');
                const colorSelectorGroup = document.getElementById('color-selector-group');
                const productColors = product.colors || [];

                if (productColors.length > 0) {
                    colorSelector.innerHTML = productColors.map((color, index) => `
                        <button class="color-btn ${index === 0 ? 'active' : ''}" 
                            data-color="${color.name}" 
                            data-hex="${color.hex}"
                            style="background: ${color.hex};" 
                            title="${color.name}"></button>
                    `).join('');
                    colorSelectorGroup.style.display = 'block';
                } else {
                    // Hide color selector if no colors available
                    colorSelectorGroup.style.display = 'none';
                }

                // Color Selector with Image Color Change
                const colorBtns = document.querySelectorAll('#color-selector .color-btn');
                const productMainImage = document.getElementById('zoom-container');
                const colorPreviewLabel = document.getElementById('color-preview-label');
                let selectedColor = productColors.length > 0 ? productColors[0].name : 'Black';

                colorBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        colorBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        selectedColor = btn.dataset.color;

                        // Change product image color
                        productMainImage.className = 'product-main-image color-black';
                        productMainImage.classList.add(`color-${selectedColor.toLowerCase()}`);

                        // Update and show color preview label
                        colorPreviewLabel.textContent = `COLOR: ${selectedColor.toUpperCase()}`;
                        colorPreviewLabel.classList.add('show');

                        // Hide label after 2 seconds
                        setTimeout(() => {
                            colorPreviewLabel.classList.remove('show');
                        }, 2000);
                    });
                });

                // Size Selector
                const sizeBtns = document.querySelectorAll('#size-selector .size-btn');
                let selectedSize = 'M';

                sizeBtns.forEach(btn => {
                    btn.addEventListener('click', () => {
                        sizeBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        selectedSize = btn.dataset.size;
                    });
                });

                if (isSoldOut) {
                    buyBtn.textContent = 'SOLD OUT';
                    buyBtn.style.background = 'linear-gradient(45deg, #500, #300)';
                    buyBtn.style.border = '1px solid var(--color-error)';
                    buyBtn.style.color = '#fff';
                    buyBtn.disabled = true;
                    buyBtn.style.cursor = 'not-allowed';

                    // Add sold out message
                    const productMeta = document.querySelector('.product-meta');
                    if (productMeta) {
                        const soldOutBanner = document.createElement('div');
                        soldOutBanner.className = 'sold-out-banner';
                        soldOutBanner.innerHTML = `
                        <div style="background: rgba(255, 68, 68, 0.1); border: 1px solid var(--color-error); padding: 1rem; margin-bottom: 1rem; text-align: center;">
                            <p style="color: var(--color-error); font-weight: 700; margin: 0;">⚠️ THIS ITEM IS SOLD OUT</p>
                            <p style="font-size: 0.8rem; opacity: 0.7; margin: 0.5rem 0 0;">This product is no longer available for purchase.</p>
                        </div>
                    `;
                        productMeta.insertBefore(soldOutBanner, productMeta.firstChild);
                    }

                    // Grayscale the product image
                    const mainImg = document.getElementById('main-img-element');
                    if (mainImg) {
                        mainImg.style.filter = 'grayscale(1) opacity(0.6)';
                    }
                } else if (!isLive) {
                    buyBtn.textContent = 'COMING SOON';
                    buyBtn.disabled = true;
                }

                buyBtn.onclick = () => {
                    // Guest checkout is now allowed - no login required

                    // Get selected size and color
                    if (!selectedSize) {
                        alert('Please select a size');
                        return;
                    }

                    window.location.href = `checkout.html?id=${product.id}&size=${selectedSize}&color=${selectedColor}`;
                };

                // Add to Cart functionality
                const addToCartBtn = document.getElementById('add-to-cart-btn');

                if (isSoldOut) {
                    addToCartBtn.disabled = true;
                    addToCartBtn.textContent = 'SOLD OUT';
                    addToCartBtn.style.opacity = '0.5';
                    addToCartBtn.style.cursor = 'not-allowed';
                } else if (!isLive) {
                    addToCartBtn.disabled = true;
                    addToCartBtn.textContent = 'COMING SOON';
                } else {
                    addToCartBtn.onclick = async () => {
                        if (!selectedSize) {
                            alert('Please select a size');
                            return;
                        }

                        const result = await storageService.addToCart({
                            productId: product.id,
                            size: selectedSize,
                            color: selectedColor,
                            quantity: 1
                        });

                        if (result.success) {
                            // Update cart count in header
                            updateCartCount();
                            // Navigate to cart page
                            window.location.href = 'cart.html';
                        } else {
                            alert(result.message);
                        }
                    };
                }

                function updateCartCount() {
                    const cartCountEl = document.getElementById('cart-count');
                    if (cartCountEl) {
                        const count = storageService.getCartCount();
                        cartCountEl.textContent = count;
                        cartCountEl.style.display = count > 0 ? 'flex' : 'none';
                    }
                }

                // Initialize cart count on page load
                updateCartCount();

                // Initialize Stock Counter
                if (isLive) {
                    new StockCounter('stock-status', product.stock, 50);
                }

                // Image Zoom Logic - use first image from images array
                const zoomImageUrl = productImages.length > 0 ? productImages[0].url : product.image;
                initZoom('zoom-container', 'main-img-element', 'lens', 'zoom-result', zoomImageUrl);
            }

            // Call loadProduct to initialize
            loadProduct();
        });

        function initZoom(containerId, imgId, lensId, resultId, imgUrl) {
            const container = document.getElementById(containerId);
            const img = document.getElementById(imgId);
            const lens = document.getElementById(lensId);
            const result = document.getElementById(resultId);

            container.addEventListener('mousemove', (e) => {
                lens.style.display = 'block';
                result.style.display = 'block';

                const rect = container.getBoundingClientRect();
                let x = e.pageX - rect.left - window.pageXOffset;
                let y = e.pageY - rect.top - window.pageYOffset;

                // Clamp lens position
                x = Math.max(0, Math.min(x - lens.offsetWidth / 2, container.offsetWidth - lens.offsetWidth));
                y = Math.max(0, Math.min(y - lens.offsetHeight / 2, container.offsetHeight - lens.offsetHeight));

                lens.style.left = x + 'px';
                lens.style.top = y + 'px';

                // Zoom background
                const cx = result.offsetWidth / lens.offsetWidth;
                const cy = result.offsetHeight / lens.offsetHeight;

                result.style.backgroundImage = `url('${imgUrl}')`;
                result.style.backgroundSize = (container.offsetWidth * cx) + 'px ' + (container.offsetHeight * cy) + 'px';
                result.style.backgroundPosition = `-${x * cx}px -${y * cy}px`;
            });

            container.addEventListener('mouseleave', () => {
                lens.style.display = 'none';
                result.style.display = 'none';
            });
        }
    </script>
</body>
